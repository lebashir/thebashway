name: CI

# The green gate on every PR and push to main: typecheck + tests.
# - `bun run typecheck` runs `tsc --noEmit` over src/ (tests are excluded — see tsconfig.json).
#   @types/bun + typescript are devDeps, so tsc resolves the bun globals (no TS2688).
# - `bun test` runs the suite.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to the dev environment for deterministic runs; bump when you bump Bun locally.
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
