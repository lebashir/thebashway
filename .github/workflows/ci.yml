name: CI

# Run the green gate on every PR and on pushes to main. The gate is `bun test` ONLY,
# mirroring the verify chain — `bunx tsc --noEmit` is deliberately NOT run here: the repo
# runs on Bun's transpile-time checking and ships no @types/bun, so standalone tsc fails
# with TS2688 (missing bun types), not real errors. See CLAUDE.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: bun test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to the dev environment for deterministic runs; bump when you bump Bun locally.
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test
